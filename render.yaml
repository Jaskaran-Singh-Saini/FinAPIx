services:
  - type: web
    name: finapix
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn FinAPIx.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "finapix.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: finapix-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: finapix-db
    plan: free
    databaseName: finapix
    user: finapix